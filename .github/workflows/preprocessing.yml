name: Automate Preprocessing

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Run automate preprocessing
        run: python preprocessing/automate_Nayla.py

      - name: Commit hasil preprocessing terbaru
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add preprocessing/credit_scoring_preprocessing -f
          git diff --staged --quiet || git commit -m "Auto: update preprocessed dataset"
          git push
